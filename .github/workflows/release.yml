name: release

# Trigger on version tags (v1.2.3, v0.1.0, etc.). Use `git tag v0.1.1 && git
# push origin v0.1.1` to cut a release. The workflow can also be launched
# manually from the Actions tab for dry-run builds.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

# Guard against concurrent releases of the same tag.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tests:
    name: tests before release
    uses: ./.github/workflows/tests.yml

  build:
    name: build distribution
    runs-on: ubuntu-latest
    needs: tests
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python
        run: uv python install 3.14

      - name: Verify tag matches pyproject.toml version
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pyproject_version=$(uv run python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "tag=$tag pyproject=$pyproject_version"
          if [ "${GITHUB_REF#refs/tags/}" != "" ] && [ "$tag" != "$pyproject_version" ]; then
            echo "::error::Tag v$tag does not match pyproject.toml version $pyproject_version"
            exit 1
          fi
          echo "version=$pyproject_version" >> "$GITHUB_OUTPUT"

      - name: Build sdist and wheel
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish-pypi:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    # Only run on actual tag pushes, not manual workflow_dispatch (which is
    # intended for dry-run builds).
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/systema2/${{ needs.build.outputs.version }}/
    # Required for PyPI Trusted Publishing (OIDC) — no API token needed.
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

  github-release:
    name: attach artifacts to GitHub release
    runs-on: ubuntu-latest
    needs: [build, publish-pypi]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create/update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
